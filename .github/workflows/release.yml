name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Release anolis-protocol
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lint protocol with Buf
        uses: bufbuild/buf-action@v1
        with:
          lint: true
          format: false
          breaking: false

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create source tarball
        run: |
          git archive --format=tar --prefix=anolis-protocol-${{ steps.version.outputs.version }}/ HEAD | gzip > anolis-protocol-${{ steps.version.outputs.version }}-source.tar.gz

      - name: Compute SHA256
        id: sha
        run: |
          sha256sum anolis-protocol-${{ steps.version.outputs.version }}-source.tar.gz | tee SHA256SUMS
          echo "sha256=$(cut -d' ' -f1 SHA256SUMS)" >> "$GITHUB_OUTPUT"

      - name: Create manifest
        run: |
          cat > manifest.json <<'EOF'
          {"schema_version": 1, "repo": "anolishq/anolis-protocol", "component": "anolis-protocol", "version": "${{ steps.version.outputs.version }}", "platform": "source", "asset": "anolis-protocol-${{ steps.version.outputs.version }}-source.tar.gz", "sha256": "${{ steps.sha.outputs.sha256 }}"}
          EOF

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python build tools
        run: pip install build hatchling hatch-vcs

      - name: Generate Python bindings
        uses: bufbuild/buf-action@v1
        with:
          generate: true
          lint: false
          format: false
          breaking: false

      - name: Create Python package init files
        run: |
          touch gen/python/anolis/__init__.py
          touch gen/python/anolis/deviceprovider/__init__.py
          touch gen/python/anolis/deviceprovider/v1/__init__.py

      - name: Create protocol_pb2 compatibility shim
        run: |
          cat > gen/python/protocol_pb2.py <<'EOF'
          """Compatibility shim: re-exports all ADPP v1 generated classes.

          Import as: import protocol_pb2 as protocol
          """
          from anolis.deviceprovider.v1.call_pb2 import *
          from anolis.deviceprovider.v1.envelope_pb2 import *
          from anolis.deviceprovider.v1.handshake_pb2 import *
          from anolis.deviceprovider.v1.health_pb2 import *
          from anolis.deviceprovider.v1.inventory_pb2 import *
          from anolis.deviceprovider.v1.readiness_pb2 import *
          from anolis.deviceprovider.v1.status_pb2 import *
          from anolis.deviceprovider.v1.telemetry_pb2 import *
          from anolis.deviceprovider.v1.types_pb2 import *
          from anolis.deviceprovider.v1.value_pb2 import *
          EOF

      - name: Build Python wheel
        run: python -m build --wheel --outdir dist/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "anolis-protocol ${{ steps.version.outputs.version }}"
          body: "Release anolis-protocol ${{ steps.version.outputs.version }} source artifacts."
          draft: false
          prerelease: false
          files: |
            anolis-protocol-${{ steps.version.outputs.version }}-source.tar.gz
            SHA256SUMS
            manifest.json
            dist/anolis_protocol-${{ steps.version.outputs.version }}-py3-none-any.whl
